<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="unit" content="単元名（例: 距離・類似度の可視化）">
<title>可視化物のタイトル</title>
<style>
  :root{
    --surface-0:#f5f4ee; --surface-1:#ecebe3; --surface-2:#ffffff;
    --text-primary:#1f1e1b; --text-secondary:#5f5e5a; --text-muted:#8a8981;
    --border:rgba(0,0,0,.10); --border-strong:rgba(0,0,0,.20);
    --bg-accent:#e6f1fb; --text-accent:#185fa5; --border-accent:#378add;
    --text-success:#3b6d11;
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"Roboto Mono",monospace;
    --radius:8px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --surface-0:#262624; --surface-1:#302f2d; --surface-2:#3a3a37;
      --text-primary:#e9e7de; --text-secondary:#b1afa5; --text-muted:#85847c;
      --border:rgba(255,255,255,.14); --border-strong:rgba(255,255,255,.26);
      --bg-accent:#0c447c; --text-accent:#b5d4f4; --border-accent:#378add;
      --text-success:#97c459;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--surface-0);color:var(--text-primary);
    font-family:var(--font-sans);line-height:1.7;
    -webkit-font-smoothing:antialiased;padding:32px 16px}
  .wrap{max-width:680px;margin:0 auto}
  h1{font-size:22px;font-weight:500;margin:0 0 4px}
  .lede{font-size:14px;color:var(--text-secondary);margin:0 0 24px}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

  /* ── 共通コンポーネント（CSS変数で色が揃う） ───────────────── */

  /* パイプライン風の段階表示 */
  .pipe{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:0 0 20px}
  .pill{font-size:12px;padding:4px 10px;border-radius:999px;background:var(--surface-1);color:var(--text-secondary);white-space:nowrap;transition:background .2s,color .2s}
  .pill.on{background:var(--bg-accent);color:var(--text-accent)}
  .sep{color:var(--text-muted);font-size:12px}

  /* ラベル付きフィールド */
  .field-label{font-size:13px;color:var(--text-secondary);margin:0 0 6px}

  /* スライダー行 */
  .ctrl{display:flex;align-items:center;gap:12px;margin:10px 0;font-size:13px;color:var(--text-secondary)}
  .ctrl>label{min-width:78px}
  .ctrl .val{min-width:44px;text-align:right;font-weight:500;color:var(--text-primary)}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:2px;background:var(--border-strong);outline:none;margin:0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border-strong);cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.15)}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--surface-2);border:1px solid var(--border-strong);cursor:pointer}
  input[type=range]:focus-visible{box-shadow:0 0 0 3px var(--bg-accent)}

  /* ボタン */
  .btns{display:flex;gap:10px;margin:22px 0 0;align-items:center;flex-wrap:wrap}
  button{display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:14px;padding:8px 14px;border-radius:var(--radius);background:transparent;color:var(--text-primary);border:.5px solid var(--border-strong);cursor:pointer;transition:background .15s,transform .05s}
  button:hover{background:var(--surface-1)}
  button:active{transform:scale(.98)}
  button svg{width:16px;height:16px}
  .status{font-size:13px;color:var(--text-muted);margin-left:auto}

  footer{margin-top:28px;font-size:12px;color:var(--text-muted);border-top:.5px solid var(--border);padding-top:12px}

  /* ── ここから下に可視化物固有のスタイルを書く ───────────────── */

</style>
</head>
<body>
<div class="wrap">
  <h1>可視化物のタイトル</h1>
  <p class="lede">この可視化物が何を示すのかの一文。build-index.mjs がこの &lt;title&gt; と .lede をギャラリーに拾う。</p>

  <h2 class="sr-only">スクリーンリーダー向けの、この図の内容説明</h2>

  <main id="widget">
    <!-- widget body here -->
  </main>

  <footer>補足・出典・免責など。</footer>
</div>

<script>
(function(){
  // widget script here
})();
</script>
</body>
</html>
